<form id="zizzleEnquiries">
<div>
<input id="name" type="text" placeholder="Name"><br><br>
<input id="email"type="email" placeholder="Email"><br><br>
<input id="phone"type="text" placeholder="Phone number"><br><br>
<textarea id ="description" placeholder =" Please give a brief description."></textarea>
<br>
<button type="submit">Submit</button>
</div>
</form>
<img src="img/logo2.jpg" alt="Logo" class="floating-logo">

<script>
document.getElementById("zizzleEnquiries").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const message = document.getElementById("description").value.trim();

    // Save to localStorage
    let messages = JSON.parse(localStorage.getItem("messages")) || [];

    messages.push({
        name: name,
        email: email,
        phone: phone,
        message: message,
        date: new Date().toLocaleString()
    });

    localStorage.setItem("messages", JSON.stringify(messages));

    // Send email via EmailJS
    emailjs.send("service_i9mh0ih", "template_35ust0n", {
        from_name: name,
        email: email,
        phone: phone,
        message: message
    })
    .then(function() {
        alert("Your message has been sent successfully!");
    }, function(error) {
        alert("Oops! Something went wrong sending the email.");
        console.error(error);
    });

    this.reset();
});
</script>
